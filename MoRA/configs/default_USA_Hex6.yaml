
seed_everything: 0

trainer:
  logger:
    class_path: lightning.pytorch.loggers.CSVLogger
   
    init_args:
      save_dir: 'mobclip_logs'
      name: 'US'
      version: 'Hex6-random-init-with-text'
         

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: "val_loss"
        save_last: False
        filename: "{epoch}-{val_loss:.2f}"
        
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: "val_loss"
        patience: 10       
        mode: "min"
        verbose: true       
        
  max_epochs: 1000

  
  
model:
  embedding_dim : 128
  mob_features_path: /data/susanket/mobclip/data/mobility_line_embeddings_hex6.npz  # path for mobility LINE embeddings
  # demo_scale: 0.7
  # image_scale: 0.2
  # poi_scale: 0.5
  scale: 0.5
  learning_rate: 0.001
  weight_decay: 0.001
 

data:
  mob_path: /data/susanket/mobclip/data/mobility_line_embeddings_hex6.npz  # path for mobility LINE embeddings
  feature_paths: /data/susanket/mobclip/preprocessed_gdbs/hex6_features_text.npz
  mob_graph_path: /data/susanket/mobclip/data/mobility_adjacency_mat_hex6.npz # path for mobility graph
  batch_size: 5120
  num_workers: 92
  val_random_split_fraction: 0.1
  
watchmodel: True
